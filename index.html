<!DOCTYPE html>
<html lang="ru">
<head>
    <!-- index.html — Экран 0 (авторизация + согласия) -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI FIT CENTER — Авторизация</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="config/themeConfig.js"></script>
    <link rel="stylesheet" href="css/styles.css" />
        <link rel="stylesheet" href="css/screen0.css" />
</head>
<body>
    <!-- Block: App Container -->
    <div class="app">

        <!-- Block: Screen0 - Авторизация + Согласия -->
        <div class="screen0">

            <!-- Block: Header -->
            <div class="screen0__header">
                <h1 class="screen0__title" id="appTitle">AI FIT CENTER</h1>
                <p class="screen0__subtitle" id="appSubtitle">Добро пожаловать!</p>
            </div>

            <!-- Block: Consent Form -->
            <form class="screen0__form" id="consentForm">

                <!-- Checkbox 1: Политика конфиденциальности -->
                <label class="screen0__checkbox-label">
                    <input type="checkbox" id="privacyCheckbox" class="screen0__checkbox" required />
                    <span class="screen0__checkbox-text">
                        Согласен с
                        <a href="#" class="screen0__link">политикой конфиденциальности</a>
                    </span>
                </label>

                <!-- Checkbox 2: Обработка персональных данных -->
                <label class="screen0__checkbox-label">
                    <input type="checkbox" id="dataProcessingCheckbox" class="screen0__checkbox" required />
                    <span class="screen0__checkbox-text">
                        Согласен с
                        <a href="#" class="screen0__link">обработкой персональных данных</a>
                    </span>
                </label>

                <!-- Block: Submit Button -->
                <button type="submit" class="screen0__button" id="authButton" disabled>
                    Авторизоваться
                </button>

            </form>

        </div>

    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Элементы
        const privacyCheckbox = document.getElementById('privacyCheckbox');
        const dataProcessingCheckbox = document.getElementById('dataProcessingCheckbox');
        const authButton = document.getElementById('authButton');
        const consentForm = document.getElementById('consentForm');

        // Проверка состояния чекбоксов
        function checkForm() {
            if (privacyCheckbox.checked && dataProcessingCheckbox.checked) {
                authButton.disabled = false;
                authButton.style.opacity = '1';
                authButton.style.cursor = 'pointer';
            } else {
                authButton.disabled = true;
                authButton.style.opacity = '0.5';
                authButton.style.cursor = 'not-allowed';
            }
        }

        // Слушатели изменений чекбоксов
        privacyCheckbox.addEventListener('change', checkForm);
        dataProcessingCheckbox.addEventListener('change', checkForm);

        // Вызов при загрузке страницы
        checkForm();

        // Обработка отправки формы
        consentForm.addEventListener('submit', function(e) {
            e.preventDefault();
            // Сохраняем согласия в localStorage
            localStorage.setItem('privacyConsent', 'true');
            localStorage.setItem('dataProcessingConsent', 'true');
            localStorage.setItem('authorized', 'true');
            // Переход на экран 1
            window.location.href = 'screen-1.html';
        });

        // Проверка при загрузке - если уже авторизован, перенаправляем
        if (localStorage.getItem('authorized') === 'true') {
            window.location.href = 'screen-1.html';
        }
    </script>
</body>
</html>
