<!DOCTYPE html>
<html lang="ru">
<head>
  <!--
    index.html — Экран 0 (авторизация + согласия)
    Перенесено из screen-0.html.
    Адаптация: поменять service_title, ссылки на политику и обработку ПД.
  -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI FIT CENTER — Авторизация</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app">

    <!-- Block: ConsentCard -->
    <div class="app__card">
      <h1 style="text-align: center; margin-bottom: 32px; font-size: 28px; color: #1a1a1a;">
        AI FIT CENTER
      </h1>

      <p style="font-size: 14px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px;">
        Для начала работы
      </p>

      <!-- Чек-бокс 1: Политика конфиденциальности -->
      <label style="display: flex; align-items: flex-start; gap: 12px; margin-bottom: 14px; cursor: pointer;">
        <input type="checkbox" id="chk-privacy" />
        <span>
          Согласен(на) с
          <a href="#" target="_blank" style="color: #3b82f6; text-decoration: underline;">политикой конфиденциальности</a>
        </span>
      </label>

      <!-- Чек-бокс 2: Обработка персональных данных -->
      <label style="display: flex; align-items: flex-start; gap: 12px; margin-bottom: 24px; cursor: pointer;">
        <input type="checkbox" id="chk-personal" />
        <span>
          Согласен(на) с
          <a href="#" target="_blank" style="color: #3b82f6; text-decoration: underline;">обработкой персональных данных</a>
        </span>
      </label>

      <!-- Block: AuthButton -->
      <button id="btn-auth" disabled style="width: 100%; padding: 16px; background: #3b82f6; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.2s;">
        Войти через Telegram
      </button>
    </div>

  </div>

  <script>
    // Block: ConsentLogic
    const chkPrivacy  = document.getElementById('chk-privacy');
    const chkPersonal = document.getElementById('chk-personal');
    const btnAuth     = document.getElementById('btn-auth');

    function updateBtn() {
      btnAuth.disabled = !(chkPrivacy.checked && chkPersonal.checked);
      btnAuth.style.opacity = btnAuth.disabled ? '0.4' : '1';
    }

    chkPrivacy.addEventListener('change', updateBtn);
    chkPersonal.addEventListener('change', updateBtn);

    // Block: TelegramAuth
    btnAuth.addEventListener('click', () => {
      const tg = window.Telegram && window.Telegram.WebApp;
      if (tg) {
        const initData = tg.initData;
        console.log('Telegram initData:', initData);
        // TODO: отправь initData на backend POST /api/auth/telegram
        // window.location.href = 'screen-1.html';
      } else {
        alert('Откройте приложение в Telegram');
      }
    });
  </script>

</body>
</html>
