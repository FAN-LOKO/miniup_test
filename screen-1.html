<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI FIT CENTER – Экран 1 (Профиль/Статус)</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
    <!-- Block: App Container -->
    <div class="app">
        <!-- Block: Screen1 - Профиль/Статус -->
        <div class="screen1">
            <h1>Экран 1 - Профиль/Статус</h1>
            
            <!-- Блок: Информация о статусе -->
            <div class="status-info">
                <h2>Статус авторизации</h2>
                <p id="statusAuthorized">Авторизован</p>
            </div>

            <!-- Блок: Данные пользователя -->
            <div class="user-data">
                <h2>Данные пользователя</h2>
                
                <!-- Аватар пользователя -->
                <div class="user-avatar">
                    <img id="userAvatar" src="https://via.placeholder.com/100" alt="Аватар пользователя" />
                </div>
                
                <!-- Имя пользователя -->
                <div class="user-info">
                    <p><strong>Имя пользователя:</strong> <span id="userName">@username</span></p>
                </div>
                
                <!-- Статус подписки -->
                <div class="subscription-status">
                    <p><strong>Статус подписки:</strong> <span id="subscriptionStatus">Активна</span></p>
                </div>
                
                <!-- Осталось дней -->
                <div class="days-left">
                    <p><strong>Осталось дней:</strong> <span id="daysLeft">30</span></p>
                </div>
            </div>
        </div>

                <!-- Block: Screen Navigation -->
        <div class="screen-nav">
            <a href="index.html" class="screen-nav__button">Главная</a>
            <a href="screen-0.html" class="screen-nav__button">Экран 0</a>
            <a href="screen-1.html" class="screen-nav__button screen-nav__button--active">Экран 1</a>
            <a href="screen-2.html" class="screen-nav__button">Экран 2</a>
            <a href="screen-3.html" class="screen-nav__button">Экран 3</a>
            <a href="screen-4.html" class="screen-nav__button">Экран 4</a>
        </div>v>

    <script src="js/app.js"></script>
</body>
</html>
